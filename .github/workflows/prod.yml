name: Production Deploy (SFTP)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-deploy:
    name: Hugo Build & SFTP Deploy (prod)
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0
          lfs: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --environment prod --minify

      - name: Deploy via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || '22' }}
          # Upload contents of public/ to the remote folder
          uploads: |
            ./public/ => ${{ secrets.SFTP_REMOTE_PATH }}
