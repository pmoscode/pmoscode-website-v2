baseURL = "https://pmoscode.de/"
environment = "production"
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  debug = false

  # ── Matomo Analytics ──────────────────────────────────────────────────────
  # Beide Werte eintragen sobald Matomo-Instanz bereit ist
  [params.matomo]
    url    = ""   # z.B. "https://analytics.example.com/"
    siteId = ""   # z.B. "1"

  [params.giscus]
    repo           = ""          # z.B. "pmoscode/pmoscode-website-v2"
    repo_id        = ""          # von giscus.app generiert
    category       = "General"
    category_id    = ""          # von giscus.app generiert
    mapping        = "pathname"
    strict         = "0"
    reactions      = "1"
    input_position = "bottom"
    theme          = "preferred_color_scheme"
    lang           = "de"
