title = "pmoscode"
theme = "pmoscode-theme"
defaultContentLanguage = "de"
enableRobotsTXT = true
enableGitInfo = false

[params]
  description = "pmoscode – Code, Inspiration und mehr"
  author = "pmoscode"
  bio = "Hello, we're content creators fascinated by code, technology and lifestyle..."

  # 5 Post-Slugs für den Editor's Pick Block (Reihenfolge: 1 groß + 4 klein)
  editors_pick = [
    "french-cleat-system",
    "air-assist-xtool-m1",
    "pi-cam-holder",
    "wood-design-clock",
    "last-pixel-standing-game",
  ]

  # ── Giscus Comments ──────────────────────────────────────────────────────
  # Anleitung:
  #   1. GitHub Discussions im Repository aktivieren (Settings → Features → Discussions)
  #   2. https://giscus.app aufrufen, Repo eingeben → Werte unten eintragen
  #   3. repo_id + category_id bekommst du ausschließlich von giscus.app
  # Solange repo_id leer ist, werden Kommentare nicht angezeigt.
  [params.giscus]
    repo          = ""          # z.B. "pmoscode/pmoscode-website-v2"
    repo_id       = ""          # von giscus.app generiert
    category      = "General"   # Name der Discussion-Kategorie
    category_id   = ""          # von giscus.app generiert
    mapping       = "pathname"  # Zuordnung: pathname | url | title | og:title
    strict        = "0"
    reactions     = "1"         # 👍-Reaktionen anzeigen
    input_position = "bottom"   # Eingabefeld: top | bottom
    theme         = "light"     # light | dark | preferred_color_scheme | ...
    lang          = "de"

  [params.contact]
    phone = "+49-123-456789"
    email = "hello@pmoscode.de"
    location = "Germany"

  # ── Matomo Analytics ─────────────────────────────────────────────────────
  # Nur aktiv wenn beide Werte gesetzt sind (wird in dev-Umgebung nicht geladen)
  [params.matomo]
    url    = ""   # z.B. "https://analytics.example.com/"
    siteId = ""   # z.B. "1"

  [[params.social]]
    name = "GitHub"
    url  = "https://github.com/pmoscode"
    icon = "github"
  [[params.social]]
    name = "Medium"
    url  = "https://medium.com/@info_26971"
    icon = "medium"
  [[params.social]]
    name = "Substack"
    url  = "https://pmoscode.substack.com/"
    icon = "substack"
  [[params.social]]
    name = "Tumblr"
    url  = "https://www.tumblr.com/blog/pmoscode"
    icon = "tumblr"
  [[params.social]]
    name = "Bluesky"
    url  = "https://bsky.app/profile/pmoscode.bsky.social"
    icon = "bluesky"

[menu]
  [[menu.main]]
    name       = "Home"
    url        = "/"
    weight     = 1
  [[menu.main]]
    name       = "Woodwork"
    url        = "/categories/woodwork/"
    weight     = 2
  [[menu.main]]
    name       = "Hardware"
    url        = "/categories/hardware/"
    weight     = 3
  [[menu.main]]
    name       = "More"
    url        = "#"
    weight     = 4
    [menu.main.params]
      hasChildren = true
  [[menu.main]]
    name       = "3D Print"
    url        = "/categories/3d-print/"
    parent     = "More"
    weight     = 1
  [[menu.main]]
    name       = "Lasercutter"
    url        = "/categories/lasercutter/"
    parent     = "More"
    weight     = 2
  [[menu.main]]
    name       = "Computer"
    url        = "/categories/computer/"
    parent     = "More"
    weight     = 3
  [[menu.main]]
    name       = "About"
    url        = "/about/"
    weight     = 5
  [[menu.main]]
    name       = "Archives"
    url        = "/archives/"
    weight     = 6

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "JSON"]
  page    = ["HTML"]
  section = ["HTML"]

[pagination]
  pagerSize = 5
