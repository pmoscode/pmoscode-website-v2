title = "pmoscode"
theme = "pmoscode-theme"
defaultContentLanguage = "de"
enableRobotsTXT = true
enableGitInfo = false

[params]
  description = "pmoscode – Code, Inspiration und mehr"
  author = "pmoscode"
  bio = "Hello, we're content creators fascinated by code, technology and lifestyle..."

  # 5 Post-Slugs für den Editor's Pick Block (Reihenfolge: 1 groß + 4 klein)
  editors_pick = [
    "french-cleat-system",
    "air-assist-xtool-m1",
    "pi-cam-holder",
    "wood-design-clock",
    "last-pixel-standing-game",
  ]

  # ── Giscus Comments ──────────────────────────────────────────────────────
  # Konfiguration erfolgt pro Stage in config/staging/hugo.toml bzw. config/prod/hugo.toml
  # Anleitung:
  #   1. GitHub Discussions im Repository aktivieren (Settings → Features → Discussions)
  #   2. https://giscus.app aufrufen, Repo eingeben → Werte eintragen
  #   3. repo_id + category_id bekommst du ausschließlich von giscus.app
  # Solange repo_id leer ist, werden Kommentare nicht angezeigt.

  [params.contact]
    phone = "+49-123-456789"
    email = "hello@pmoscode.de"
    location = "Germany"

  [[params.social]]
    name = "GitHub"
    url  = "https://github.com/pmoscode"
    icon = "github"
  [[params.social]]
    name = "Medium"
    url  = "https://medium.com/@info_26971"
    icon = "medium"
  [[params.social]]
    name = "Substack"
    url  = "https://pmoscode.substack.com/"
    icon = "substack"
  [[params.social]]
    name = "Tumblr"
    url  = "https://www.tumblr.com/blog/pmoscode"
    icon = "tumblr"
  [[params.social]]
    name = "Bluesky"
    url  = "https://bsky.app/profile/pmoscode.bsky.social"
    icon = "bluesky"

[menu]
  [[menu.main]]
    name       = "Home"
    url        = "/"
    weight     = 1
  [[menu.main]]
    name       = "All Posts"
    url        = "/posts/"
    weight     = 2
  [[menu.main]]
    name       = "Categories"
    url        = "/categories/"
    weight     = 3
    [menu.main.params]
      dynamicCategories = true
  [[menu.main]]
    name       = "Archives"
    url        = "/archives/"
    weight     = 4
  [[menu.main]]
    name       = "About"
    url        = "/about/"
    weight     = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "JSON"]
  page    = ["HTML"]
  section = ["HTML"]

[pagination]
  pagerSize = 5
