<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-overlay__backdrop" id="search-backdrop"></div>
  <div class="search-overlay__panel">

    <div class="search-overlay__header">
      <div class="search-overlay__input-wrap">
        <svg class="search-overlay__icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search-input" class="search-overlay__input"
               placeholder="Search…" autocomplete="off" spellcheck="false">
      </div>
      <button class="search-overlay__close" id="search-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="search-results" class="search-overlay__results"></div>

    <div class="search-overlay__footer">
      <span><kbd>ESC</kbd> Close</span>
      <span><kbd>/</kbd> or <kbd>Ctrl K</kbd> Open</span>
    </div>

  </div>
</div>
