<div class="author-box">
  <div class="author-box__avatar">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" fill="#c9d6df"/>
      <circle cx="40" cy="30" r="14" fill="#98afbe"/>
      <ellipse cx="40" cy="62" rx="22" ry="14" fill="#98afbe"/>
    </svg>
  </div>
  <div>
    <div class="author-box__name">{{ .Params.author | default .Site.Params.author }}</div>
    <p class="author-box__bio">{{ .Site.Params.bio }}</p>
    <div class="social-icons">
      {{- range .Site.Params.social }}
      <a href="{{ .url }}" title="{{ .name }}" target="_blank" rel="noopener noreferrer">
        {{- if eq .icon "facebook" }}<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        {{- else if eq .icon "twitter" }}<svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
        {{- else if eq .icon "instagram" }}<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        {{- end }}
      </a>
      {{- end }}
    </div>
  </div>
</div>
