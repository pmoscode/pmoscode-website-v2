<header class="site-header">
  <div class="site-header__inner">

    {{- /* Logo */}}
    <a class="site-logo" href="{{ "/" | relURL }}">
      <img class="site-logo__img" src="/img/avatar.png" alt="{{ .Site.Title }} Logo">
      {{- .Site.Title -}}<span>.</span>
    </a>

    {{- /* Main Nav */}}
    <nav class="site-nav">
      {{- range .Site.Menus.main }}
        {{- if .HasChildren }}
        <div class="site-nav__item site-nav__item--dropdown">
          <a class="site-nav__link{{ if $.IsHome }} {{ end }}" href="{{ .URL }}">{{ .Name }}</a>
          <div class="site-nav__dropdown">
            {{- range .Children }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{- end }}
          </div>
        </div>
        {{- else }}
        <div class="site-nav__item">
          <a class="site-nav__link{{ if or (eq $.RelPermalink .URL) (and $.IsHome (eq .URL "/")) }} active{{ end }}"
             href="{{ .URL }}">{{ .Name }}</a>
        </div>
        {{- end }}
      {{- end }}
    </nav>

    {{- /* Right: Social + Buttons */}}
    <div class="site-header__right">
      {{- partial "social-icons.html" . }}
      <button class="btn btn--icon" id="menu-toggle" aria-label="Menu" title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

  </div>
</header>
