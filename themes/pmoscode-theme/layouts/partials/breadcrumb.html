<nav class="breadcrumb" aria-label="Breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a>
  {{- range .Ancestors.Reverse }}
  {{- if and (not .IsHome) (not (eq .Kind "section")) (not (eq .Kind "taxonomy")) }}
  <span class="breadcrumb__sep">/</span>
  <a href="{{ .Permalink }}">{{ .Title }}</a>
  {{- end }}
  {{- end }}
  <span class="breadcrumb__sep">/</span>
  <span>{{ .Title }}</span>
</nav>
