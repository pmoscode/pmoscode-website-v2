<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{- if .Site.Params.debug }}
<meta name="robots" content="noindex, nofollow">
{{- end }}
<link rel="preload" href="{{ "fonts/lato-400.woff2" | absURL }}" as="font" type="font/woff2" crossorigin>
{{- $css := resources.Get "css/main.css" | minify }}
<link rel="stylesheet" href="{{ $css.Permalink }}">
{{- $js := resources.Get "js/main.js" | minify }}
<script defer src="{{ $js.Permalink }}"></script>
{{- with .Site.Params.matomo -}}
{{- if and .url .siteId (ne hugo.Environment "development") }}
<!-- Matomo -->
<script>
  var _paq = window._paq = window._paq || [];
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    var u="{{ .url }}";
    _paq.push(['setTrackerUrl', u+'matomo.php']);
    _paq.push(['setSiteId', '{{ .siteId }}']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
  })();
</script>
<!-- End Matomo -->
{{- end }}
{{- end }}
