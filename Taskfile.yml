# https://taskfile.dev
version: '3'

tasks:

  # ── Default ────────────────────────────────────────────────────────────────
  default:
    desc: Alle verfügbaren Tasks anzeigen
    silent: true
    cmds:
      - task --list

  # ── Setup ──────────────────────────────────────────────────────────────────
  setup:
    desc: "Projekt einrichten: Git LFS + Transcribe-Venv"
    cmds:
      - task: lfs:install
      - task: lfs:pull
      - task: transcribe:setup

  # ── Development ────────────────────────────────────────────────────────────
  dev:
    desc: Hugo Dev-Server starten (http://localhost:1313, environment=development)
    deps: [lfs:verify]
    cmds:
      - hugo server

  # ── Build ──────────────────────────────────────────────────────────────────
  build:staging:
    desc: Site für Staging bauen (minified, environment=staging)
    deps: [lfs:verify]
    cmds:
      - hugo --environment staging --minify

  build:prod:
    desc: Site für Produktion bauen (minified, environment=prod)
    deps: [lfs:verify]
    cmds:
      - hugo --environment prod --minify

  clean:
    desc: "Build-Artefakte löschen (public/ + resources/_gen/)"
    prompt: public/ und resources/_gen/ wirklich löschen?
    cmds:
      - rm -rf public resources/_gen

  # ── Content ────────────────────────────────────────────────────────────────
  new:post:
    desc: "Neuen Post anlegen  →  task new:post NAME=mein-post-slug"
    requires:
      vars: [NAME]
    cmds:
      - hugo new content/posts/{{.NAME}}/index.md
      - echo 'Post erstellt unter content/posts/{{.NAME}}/index.md'

  # ── Git LFS ────────────────────────────────────────────────────────────────
  lfs:install:
    desc: Git LFS installieren und im Repository initialisieren
    status:
      - git lfs env | grep -q "filter.lfs.smudge"
    cmds:
      - git lfs install

  lfs:pull:
    desc: Alle LFS-Dateien vom Remote laden (nach clone/checkout)
    cmds:
      - git lfs pull

  lfs:push:
    desc: Alle LFS-Objekte explizit zum Remote hochladen (nach History-Rewrite o.ä.)
    cmds:
      - git lfs push --all origin

  lfs:status:
    desc: Status aller LFS-Dateien anzeigen
    cmds:
      - git lfs status
      - git lfs ls-files

  lfs:verify:
    desc: Prüfen ob Git LFS korrekt eingerichtet ist
    internal: true
    silent: true
    preconditions:
      - sh: git lfs env
        msg: |
          Git LFS ist nicht installiert oder nicht initialisiert.
            macOS:  brew install git-lfs
            Setup:  task setup

  # ── Transcribe ─────────────────────────────────────────────────────────────
  transcribe:setup:
    desc: "Python-Venv für Transcribe einrichten + Abhängigkeiten installieren"
    status:
      - test -f transcribe/.venv/bin/python
    cmds:
      - python3.11 -m venv transcribe/.venv
      - transcribe/.venv/bin/pip install --quiet --upgrade pip
      - transcribe/.venv/bin/pip install --quiet --only-binary llvmlite llvmlite==0.45.1
      - transcribe/.venv/bin/pip install --quiet -r transcribe/requirements.txt

  transcribe:run:
    desc: "Audio/Video transkribieren  →  task transcribe:run FILE=path/to/file.mp4"
    requires:
      vars: [FILE]
    deps: [transcribe:verify]
    vars:
      MODEL: '{{.MODEL | default "large"}}'
      LANG: '{{.LANG | default "de"}}'
      FORMAT: '{{.FORMAT | default "txt"}}'
    cmds:
      - transcribe/.venv/bin/python transcribe/transcribe.py "{{.FILE}}" --model {{.MODEL}} --language {{.LANG}} --format {{.FORMAT}}

  transcribe:verify:
    desc: Prüfen ob Transcribe-Venv eingerichtet ist
    internal: true
    silent: true
    preconditions:
      - sh: test -f transcribe/.venv/bin/python
        msg: |
          Transcribe-Venv nicht gefunden.
            Setup:  task transcribe:setup
